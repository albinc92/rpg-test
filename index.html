<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Responsive viewport optimized for mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Top-Down RPG</title>
    <!-- Add Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Lato', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }
        
        * {
            cursor: none !important;
        }

        body.editor-active,
        body.editor-active * {
            cursor: default !important;
        }
        
        #webglCanvas, #gameCanvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            /* High-quality anti-aliased scaling with smooth filtering */
            image-rendering: auto;
            image-rendering: smooth;
            -ms-interpolation-mode: bicubic;
            /* CRITICAL: Both canvases must scale identically for coordinate alignment */
            width: 100%;
            height: 100%;
            /* Fill screen - choose one: */
            /* object-fit: contain;  - Letterboxing, maintains aspect ratio */
            /* object-fit: fill;     - No letterboxing, stretches to fill */
            object-fit: fill;
        }
        
        #webglCanvas {
            z-index: 1; /* Background layer */
            pointer-events: none; /* WebGL canvas doesn't receive input */
        }
        
        #gameCanvas {
            z-index: 2; /* Foreground layer */
            pointer-events: auto; /* Canvas2D receives all input events */
        }

        /* ── Boot Loading Screen ── */
        #bootSplash {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: 1000;
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.6s ease-out;
        }
        #bootSplash.fade-out {
            opacity: 0;
            pointer-events: none;
        }
        /* Spinner — three pulsing dots */
        #bootSplash .spinner {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }
        #bootSplash .spinner .dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #4a9eff;
            animation: pulse-dot 1.2s ease-in-out infinite;
        }
        #bootSplash .spinner .dot:nth-child(2) { animation-delay: 0.2s; }
        #bootSplash .spinner .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse-dot {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1.0); opacity: 1; }
        }
        #bootSplash .status-text {
            font-family: 'Lato', sans-serif;
            font-size: 14px;
            color: #666;
            letter-spacing: 0.05em;
        }

    </style>
</head>
<body>
    <!-- Boot loading screen — visible while scripts load -->
    <div id="bootSplash">
        <div class="spinner">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        <div class="status-text">Loading…</div>
    </div>

    <!-- WebGL canvas (background layer) -->
    <canvas id="webglCanvas"></canvas>
    
    <!-- Canvas2D (foreground layer) -->
    <canvas id="gameCanvas"></canvas>
    
    <!-- Load main entry point with Vite -->
    <script type="module" src="/src/main.js"></script>
</body>
</html>
